<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Life is Strange | Cadastro</title>

  <script src="./js/sessao.js"></script>

  <link rel="stylesheet" href="./css/estilo.css" />
  <link rel="icon" href="./assets/icon/favicon2.ico" />
  <link rel="preconnect" href="https://fonts.gstatic.com" />
</head>

<body onload="listar()">
 
  <section class="tela_cadastro">
    <header>
      <nav class="barra-navegacao">
        <img src="./assets/imgs/LOGOLS-removebg-preview 1.png" alt="Logo do jogo">
        <ul class="topicos-barra">
          <li><a href="./index.html" class="topico_home">Inicio</a></li>
          <li><a href="./index.html" class="topico_contexto">Contexto</a></li>
          <li><a href="./index.html" class="topico_historia">História</a></li>
          <li><a href="./index.html" class="topico_personagens">Personagens</a></li>
          <li><a href="./index.html" class="topico_reflexao">Reflexão</a></li>
        </ul>
      </nav>
    </header>

    <div class="login">
      <div class="alerta_erro">
        <div class="card_erro" id="cardErro">
          <span id="mensagem_erro"></span>
        </div>
      </div>

      <div class="card card-cadastro">
        <h2>Bem-vindo!</h2>
        <div class="formulario">
          <div class="div_inputs">
            <span>Nome:</span>
            <input id="nome_input" type="text" placeholder="Seu nome" />
          </div>
          <div class="div_inputs">
            <span>E-mail:</span>
            <input id="email_input" type="text" placeholder="meuemail@provedor.com" />
          </div>
          <div class="div_inputs">
            <span>Senha:</span>
            <input id="senha_input" type="password" placeholder="******" />
          </div>
          <div class="div_inputs">
            <span>Confirmação da Senha:</span>
            <input id="confirmacao_senha_input" type="password" placeholder="******" />
          </div>
          <div class="div_btn_entrar">
            <button class="botao" onclick="cadastrar()">Cadastrar</button>
            <a href="./login.html" class="link_login">Já possui cadastro? Realize seu
              login!</a>
          </div>
          <div id="div_aguardar" class="loading-div">
            <img src="./assets/circle-loading.gif" id="loading-gif" />
          </div>

          <div id="div_erros_login"></div>
        </div>

      </div>
  </section>

</body>

</html>

<script>

  // Array para armazenar empresas cadastradas para validação de código de ativação 
  let listaEmpresasCadastradas = [];
  let listaCaracteresEspeciais = ["!", "@", "#", "$", "%", "*"];

  function cadastrar() {
    // aguardar();

    //Recupere o valor da nova input pelo nome do id
    // Agora vá para o método fetch logo abaixo
    var nomeVar = nome_input.value;
    var emailVar = email_input.value;
    var senhaVar = senha_input.value;
    var confirmacaoSenhaVar = confirmacao_senha_input.value;
    var temCaractereEspecial = false;
    
   // var codigoVar = codigo_input.value;
    // var idEmpresaVincular
 for(let i = 0; i < listaCaracteresEspeciais.length; i++) {
      if(senhaVar.includes(listaCaracteresEspeciais[i])) {
        temCaractereEspecial = true;
        break;
      }
    }
    // Verificando se há algum div_inputs em branco
    if (
      nomeVar == "" ||
      emailVar == "" ||
      senhaVar == "" ||
      confirmacaoSenhaVar == "" 
    //  codigoVar == ""
    ) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML =
        "Todos os campos devem estar preenchidos!";

      finalizarAguardar();
      return false;
    }
   else if (nomeVar.length < 3 ) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML =
        "O nome deve possuir no minimo 3 caracteres";

      finalizarAguardar();
      return false;
    } 

 else if (emailVar.includes('@') != true) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML =
        "O seu email precisa incluir de um simbolo '@' ";

      finalizarAguardar();
      return false;
    } 

    else if (senhaVar.length < 6) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML =
        "A senha precisa ter no minimo 6 caracteres";
      finalizarAguardar();
      return false;
    } 

    else if (senhaVar != confirmacaoSenhaVar) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML =
        "A senha informada na confirmação não coencide com a senha informada";

      finalizarAguardar();
      return false;
    } 


   else if(temCaractereEspecial == false) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML =
        "A senha precisa conter no minimo um caractere especial! ('!', '@', '#', '$', '%','*')";

      finalizarAguardar();
      return false;
    } else {
      setInterval(sumirMensagem, 5000);
    }
    
    // Enviando o valor da nova input
    fetch("/usuarios/cadastrar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        // crie um atributo que recebe o valor recuperado aqui
        // Agora vá para o arquivo routes/usuario.js
        nomeServer: nomeVar,
        emailServer: emailVar,
        senhaServer: senhaVar
        // idEmpresaVincularServer: idEmpresaVincular
      }),
    })
      .then(function (resposta) {
        console.log("resposta: ", resposta);

        if (resposta.ok) {
          cardErro.style.display = "block";

          mensagem_erro.innerHTML =
            "Cadastro realizado com sucesso! Redirecionando para tela de Login...";

          setTimeout(() => {
            window.location = "login.html";
          }, "2000");

          limparFormulario();
          finalizarAguardar();
        } else {
          throw "Houve um erro ao tentar realizar o cadastro!";
        }
      })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
        finalizarAguardar();
      });

    return false;
  }

  // Listando empresas cadastradas 
  function listar() {
    fetch("/empresas/listar", {
      method: "GET",
    })
      .then(function (resposta) {
        resposta.json().then((empresas) => {
          empresas.forEach((empresa) => {
            listaEmpresasCadastradas.push(empresa);

            console.log("listaEmpresasCadastradas")
            console.log(listaEmpresasCadastradas[0].codigo_ativacao)
          });
        });
      })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
      });
  }

  function sumirMensagem() {
    cardErro.style.display = "none";
  }
</script>
