    // Função para plotar o gráfico de barra
    function plotarGraficoBarra(dados) {


        // Preenchendo os arrays com os dados
        /* for(var i = 0; i < dadosTendencia.length; i++){
           votos.push(dadosTendencia[i].votos);
           jogadores.push(dadosTendencia[i].jogador);
         } */

        // Capturando o elemento canvas pelo id 
        var ctx = document.getElementById('barra').getContext('2d');
        // Criando o gráfico de barra usando o Chart.js
        var myChart = new Chart(ctx, {
            type: 'bar', // Tipo de gráfico: barra
            data: { // Dados para o gráfico
                labels: ['Racional', 'Emotivo'], // Rótulos no eixo X
                datasets: [{
                    label: 'Tendencias', // Nome do conjunto de dados
                    data: [dados[0].Racional, dados[0].Emotivo],
                    backgroundColor: [
                      '#232a8ca8','#932a2ad2 ' // Cor de fundo das linhas
                  ]
                }]
            },
        });
    }

    function plotarGraficoPizza(dados) {
        var ctx = document.getElementById('pizza').getContext('2d');
        var myChart = new Chart(ctx, {
            type: 'pie',
            data: {
                labels: ['Empatia', 'Lealdade', 'Justiça', 'Coragem'],
                datasets: [{
                    label: 'Pontuação', // Nome do conjunto de dados
                    data: [dados[0].Empatia, dados[0].Lealdade, dados[0].Justica, dados[0].Coragem], // Dados dos votos
                    backgroundColor: [
                      '#eb9b11dd','#2e4723dd','#1e7fafdd','#66202add' // Cor de fundo das linhas
                  ],
                  borderWidth: 0
                }]
            },
        });
    }

    function exibirKPI(dados) {
        var empatia = dados[0].Empatia;
        var justica = dados[0].Justica;
        var coragem = dados[0].Coragem;
        var lealdade = dados[0].Lealdade;
        var emotivo = dados[0].Emotivo;
        var racional = dados[0].Racional;
        var emocaoDominante = '';
        var maiorEmocao = 0;
        var tendenciaDominante = '';

        if(empatia > maiorEmocao) {
            maiorEmocao = empatia;
            emocaoDominante = 'Empatia';
            div_filho_kpi_Emocao.style.backgroundColor = '#ab5b1eec';
        }
        
        if (justica > maiorEmocao) {
            maiorEmocao = justica;
            emocaoDominante = 'Justiça';
            div_filho_kpi_Emocao.style.backgroundColor = '#1e7fafdd';
        }

        if (coragem > maiorEmocao) {
            maiorEmocao = coragem;
            emocaoDominante = 'Coragem';
            div_filho_kpi_Emocao.style.backgroundColor = '#66202add';
        }

        if (lealdade > maiorEmocao) {
            maiorEmocao = lealdade;
            emocaoDominante = 'Lealdade';
            div_filho_kpi_Emocao.style.backgroundColor = '#2e4723dd';
        }

        if(racional > emotivo) {
            tendenciaDominante = 'Racionais';
            div_filho_kpi_Tendencia.style.backgroundColor = '#232a8ca8';
        } else if(emotivo > racional){
            tendenciaDominante = 'Emotivas';
            div_filho_kpi_Tendencia.style.backgroundColor = '#932a2ad2';
        } else {
            tendenciaDominante = 'Equilibradas';
            div_filho_kpi_Tendencia.style.backgroundColor = '#57361cec';
        }

        kpi_emocao.innerHTML = `${emocaoDominante}`;
        kpi_tendencia.innerHTML = `${tendenciaDominante}`;


    }
